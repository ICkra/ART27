<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8">
<title>Styled To-Do List</title>
<link rel="stylesheet" href="styles.css" />
</head>

<body>
<ul class="todo-list">
<li><input type="checkbox" id="bath">
<label for="bath">BATH</label>
<ul class="sub-item">
<li><a class="sub-item-link" href="https://google.com" target="_blank">Clean bath</a></li>
</ul>
</li>

<li><input type="checkbox" id="kitchen">
<label for="kitchen">KITCHEN</label>
<ul class="sub-item">
<li><a class="sub-item-link" href="https://google.com" target="_blank">Clean kitchen</a></li>
</ul>
</li>

<li><input type="checkbox" id="bed">
<label for="bed">BEDROOM</label>
<ul class="sub-item">
<li><a class="sub-item-link" href="https://google.com" target="_blank">Clean bedroom</a></li>
</ul>
</li>

<li><input type="checkbox" id="homework">
<label for="homework">HOMEWORK</label>
<ul class="sub-item">
<li><a class="sub-item-link" href="https://google.com" target="_blank">Design a logo</a></li>
</ul>
</li>

</ul>
</body>

</html>
