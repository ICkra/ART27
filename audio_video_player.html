<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HTML Audio and Video Lab</title>
</head>

<body>
  <h1>Mini Audio and Video Player</h1>
  <section>
    <h2>Definitely NOT a rickroll</h2>
    <video
      controls
      width="640">
      <source src="rickroll.mp4" type="video/mp4" />
    </video>
  </section>

  <section>
    <h2>Ado - Fleeting Lullaby</h2>
    <audio
      controls
      loop
      src="audio.ogg"
    />
  </section>
</body>
</html>
